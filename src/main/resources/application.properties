spring.application.name=md2docu
server.port=8080

# 업로드 파일 크기 제한
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

# 임시 파일 보관 시간 (초)
app.convert.temp-expiry-seconds=3600

# ZIP 압축 해제 최대 크기 (기본 350MB)
app.zip.max-extract-bytes=367001600

# PDF 변환 시 사용할 폰트 목록 ("경로|패밀리명" 쉼표 구분, 존재하는 파일만 자동 감지)
app.pdf.font.paths=\
  C:/Windows/Fonts/malgun.ttf|Malgun Gothic,\
  C:/Windows/Fonts/malgunbd.ttf|Malgun Gothic,\
  /usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc|Noto Sans CJK,\
  /Users/shmin/Library/Fonts/MALGUN.TTF|Malgun Gothic,\
  /Users/shmin/Library/Fonts/MALGUNBD.TTF|Malgun Gothic
