<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>md2docu — Markdown 변환기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #f8f9fa; }
    .editor-wrap { position: relative; }
    #editor {
      width: 100%;
      height: 420px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 12px;
      background: #fff;
    }
    #preview-pane {
      height: 420px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 16px;
      background: #fff;
      font-size: 14px;
    }
    #preview-pane h1 { font-size: 1.6rem; border-bottom: 2px solid #333; padding-bottom: 4px; }
    #preview-pane h2 { font-size: 1.3rem; border-bottom: 1px solid #ccc; }
    #preview-pane pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    #preview-pane code { background: #f0f0f0; padding: 1px 4px; border-radius: 2px; font-size: 90%; }
    #preview-pane pre code { background: none; padding: 0; }
    #preview-pane table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    #preview-pane th, #preview-pane td { border: 1px solid #ccc; padding: 6px 10px; }
    #preview-pane th { background: #f0f0f0; }
    #preview-pane blockquote { border-left: 4px solid #ccc; margin: 0; padding: 4px 12px; color: #666; background: #fafafa; }
    #preview-pane img { max-width: 100%; }
    .drop-zone {
      border: 2px dashed #adb5bd;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #0d6efd; background: #e8f0fe; }
    #result-box { display: none; }
    #warning-box { display: none; }
    .spinner-border { width: 1.2rem; height: 1.2rem; }
  </style>
</head>
<body>
<div class="container py-4">
  <h1 class="mb-1">md2docu</h1>
  <p class="text-muted mb-4">Markdown 파일을 PDF 또는 DOCX로 변환합니다.</p>

  <ul class="nav nav-tabs mb-3" id="inputTab">
    <li class="nav-item">
      <button class="nav-link active" data-tab="editor">텍스트 입력</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-tab="file">파일 업로드</button>
    </li>
  </ul>

  <!-- 텍스트 입력 탭 -->
  <div id="tab-editor">
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Markdown 입력</label>
        <div class="editor-wrap">
          <textarea id="editor" placeholder="# 제목&#10;&#10;내용을 입력하세요..."># md2docu 테스트

## 기능 소개

**md2docu**는 Markdown 파일을 *PDF* 또는 *DOCX*로 변환합니다.

### 지원 기능

- 이미지 자동 임베드
- 링크 처리 (외부 URL, 앵커, 첨부파일)
- 표, 코드 블록, 인용문 변환

### 코드 예시

```java
System.out.println("Hello, md2docu!");
```

### 표 예시

| 항목 | 설명 |
|------|------|
| PDF  | openhtmltopdf 사용 |
| DOCX | Apache POI 사용 |

> 변환 옵션에서 이미지 포함 여부, 링크 전략 등을 설정할 수 있습니다.
</textarea>
        </div>
      </div>
      <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label fw-semibold mb-0">미리보기</label>
          <button class="btn btn-sm btn-outline-secondary" id="btn-preview">미리보기 갱신</button>
        </div>
        <div id="preview-pane"></div>
      </div>
    </div>
  </div>

  <!-- 파일 업로드 탭 -->
  <div id="tab-file" style="display:none">
    <div class="drop-zone mb-3" id="drop-zone">
      <p class="mb-1">📄 .md 파일 또는 📦 .zip 파일을 여기에 드래그하거나 클릭하세요</p>
      <small class="text-muted">ZIP: .md 파일과 이미지를 함께 압축</small>
      <input type="file" id="file-input" accept=".md,.zip" style="display:none"/>
    </div>
    <div id="file-info" class="d-none alert alert-info py-2 px-3 fw-semibold"></div>
  </div>

  <!-- 변환 옵션 -->
  <div class="card mb-3">
    <div class="card-header py-2 fw-semibold">변환 옵션</div>
    <div class="card-body py-3">
      <div class="row g-3">
        <div class="col-sm-3">
          <label class="form-label small">출력 형식</label>
          <select class="form-select form-select-sm" id="opt-format">
            <option value="pdf">PDF</option>
            <option value="docx" selected>DOCX</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label class="form-label small">페이지 크기</label>
          <select class="form-select form-select-sm" id="opt-pagesize">
            <option value="A4">A4</option>
            <option value="LETTER">Letter</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label class="form-label small">링크 처리 방식</label>
          <select class="form-select form-select-sm" id="opt-link">
            <option value="keep">링크 유지</option>
            <option value="warn">첨부 경고 표시</option>
            <option value="ignore">링크 텍스트만</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label class="form-label small d-block">&nbsp;</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="opt-images" checked/>
            <label class="form-check-label small" for="opt-images">이미지 포함</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="opt-toc" checked/>
            <label class="form-check-label small" for="opt-toc">목차 생성</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="btn btn-primary px-5 py-2" id="btn-convert" style="min-width:160px">
    <span class="spinner-border me-1 d-none" id="spinner"></span>
    변환하기
  </button>

  <!-- 결과 -->
  <div id="result-box" class="alert alert-success mt-3">
    <strong>✅ 변환 완료! 파일이 자동으로 다운로드됩니다.</strong>
    <a id="download-link" href="#" class="btn btn-sm btn-success ms-2">다시 받기</a>
  </div>

  <div id="warning-box" class="alert alert-warning mt-2">
    <strong>⚠ 변환 경고</strong>
    <ul id="warning-list" class="mb-0 mt-1 small"></ul>
  </div>

  <div id="error-box" class="alert alert-danger mt-3" style="display:none"></div>
</div>

<script>
  // ── 탭 전환 ──────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-editor').style.display = btn.dataset.tab === 'editor' ? '' : 'none';
      document.getElementById('tab-file').style.display   = btn.dataset.tab === 'file'   ? '' : 'none';
    });
  });

  // ── 파일 드래그&드롭 ──────────────────────────────────────────────────────
  let selectedFile = null;
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const info = document.getElementById('file-info');
    info.textContent = `📄 ${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;
    info.classList.remove('d-none');
  }

  // ── 미리보기 ──────────────────────────────────────────────────────────────
  document.getElementById('btn-preview').addEventListener('click', updatePreview);
  document.getElementById('editor').addEventListener('input', debounce(updatePreview, 600));

  async function updatePreview() {
    const markdown = document.getElementById('editor').value;
    try {
      const res = await fetch('/api/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ markdown })
      });
      const data = await res.json();
      document.getElementById('preview-pane').innerHTML = data.html;
    } catch (e) { /* 무시 */ }
  }

  // 초기 미리보기
  updatePreview();

  // ── 변환 ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-convert').addEventListener('click', async () => {
    const format   = document.getElementById('opt-format').value;
    const pageSize = document.getElementById('opt-pagesize').value;
    const link     = document.getElementById('opt-link').value;
    const images   = document.getElementById('opt-images').checked;
    const toc      = document.getElementById('opt-toc').checked;

    const activeTab = document.querySelector('[data-tab].active').dataset.tab;
    hideResults();
    setLoading(true);

    try {
      let data;

      if (activeTab === 'editor') {
        const markdown = document.getElementById('editor').value;
        const res = await fetch(`/api/convert/${format}/text`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ markdown, pageSize, linkStrategy: link, includeImages: images, generateToc: toc })
        });
        data = await res.json();
        if (!res.ok) throw new Error(data.error || '변환 오류');
      } else {
        if (!selectedFile) { alert('파일을 선택해 주세요.'); setLoading(false); return; }
        const form = new FormData();
        form.append('file', selectedFile);
        form.append('pageSize', pageSize);
        form.append('linkStrategy', link);
        form.append('includeImages', images);
        form.append('generateToc', toc);
        const res = await fetch(`/api/convert/${format}`, { method: 'POST', body: form });
        data = await res.json();
        if (!res.ok) throw new Error(data.error || '변환 오류');
      }

      showResult(data);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  });

  function showResult(data) {
    // 자동 다운로드
    const a = document.createElement('a');
    a.href = data.downloadUrl;
    a.download = data.fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // 결과 박스 (수동 재다운로드용)
    const link = document.getElementById('download-link');
    link.href = data.downloadUrl;
    link.download = data.fileName;
    link.textContent = data.fileName + ' 다시 받기';
    document.getElementById('result-box').style.display = '';

    const warnings = data.warnings || [];
    if (warnings.length > 0) {
      const list = document.getElementById('warning-list');
      list.innerHTML = warnings.map(w => `<li>${w.message}</li>`).join('');
      document.getElementById('warning-box').style.display = '';
    }
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = '오류: ' + msg;
    box.style.display = '';
  }

  function hideResults() {
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('warning-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  }

  function setLoading(v) {
    document.getElementById('spinner').classList.toggle('d-none', !v);
    document.getElementById('btn-convert').disabled = v;
  }

  function debounce(fn, delay) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
  }
</script>
</body>
</html>
